<!DOCTYPE html>
<html>
<body>

  <label>Número 1:</label>
  <input type="number" id="n1"><br><br>

  <label>Número 2:</label>
  <input type="number" id="n2"><br><br>

  <label>Número 3:</label>
  <input type="number" id="n3"><br><br>

  <label>Número 4:</label>
  <input type="number" id="n4"><br><br>

  <button onclick="mostrar()">Enviar</button>

  <p id="resultado"></p>
<script>
    const media = (n1, n2, n3, n4) => {
      return (n1 + n2 + n3 + n4) / 4;
    }

    const mostrar = () => {
      const n1 = parseFloat(document.getElementById("n1").value);
      const n2 = parseFloat(document.getElementById("n2").value);
      const n3 = parseFloat(document.getElementById("n3").value);
      const n4 = parseFloat(document.getElementById("n4").value);
      const resultado = media(n1, n2, n3, n4);
      document.getElementById("resultado").textContent = resultado;
    }
</script>
